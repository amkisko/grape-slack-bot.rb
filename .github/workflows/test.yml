name: test

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - gemfile: rails6
            ruby_version: "3.1"
          - gemfile: rails72
            ruby_version: "3.2"
          - gemfile: rails8ruby34
            ruby_version: "3.4"
          - gemfile: rails8truffleruby
            ruby_version: "truffleruby"

    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/${{ matrix.gemfile }}.gemfile

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby_version }}
          bundler-cache: true

      - name: Run tests with Polyrun
        run: bundle exec polyrun parallel-rspec --workers 1 --merge-failures
